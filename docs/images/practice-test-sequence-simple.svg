<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760">
  <rect width="1180" height="760" fill="#ffffff"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#111111"/>
    </marker>
    <marker id="arrow-dashed" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L9,3 L0,6 Z" fill="#111111"/>
    </marker>
  </defs>

  <style>
    .box { fill: #ffffff; stroke: #111111; stroke-width: 1.4; }
    .line { stroke: #111111; stroke-width: 1.4; fill: none; marker-end: url(#arrow); }
    .dash { stroke: #111111; stroke-width: 1.4; fill: none; stroke-dasharray: 4 4; marker-end: url(#arrow-dashed); }
    .life { stroke: #111111; stroke-width: 1.2; }
    .text { font-family: "Microsoft YaHei", "SimSun", sans-serif; font-size: 19px; fill: #111111; }
    .label { font-family: "Microsoft YaHei", "SimSun", sans-serif; font-size: 18px; fill: #111111; }
  </style>

  <!-- participant boxes -->
  <rect class="box" x="45" y="20" width="150" height="70" rx="3"/>
  <text class="text" x="120" y="62" text-anchor="middle">学习者</text>

  <rect class="box" x="270" y="20" width="165" height="70" rx="3"/>
  <text class="text" x="352.5" y="62" text-anchor="middle">前端页面</text>

  <rect class="box" x="520" y="20" width="165" height="70" rx="3"/>
  <text class="text" x="602.5" y="62" text-anchor="middle">后端服务</text>

  <rect class="box" x="760" y="20" width="150" height="70" rx="3"/>
  <text class="text" x="835" y="62" text-anchor="middle">MySQL</text>

  <rect class="box" x="975" y="20" width="165" height="70" rx="3"/>
  <text class="text" x="1057.5" y="62" text-anchor="middle">进度服务</text>

  <!-- lifelines -->
  <line class="life" x1="120" y1="90" x2="120" y2="665"/>
  <line class="life" x1="352.5" y1="90" x2="352.5" y2="665"/>
  <line class="life" x1="602.5" y1="90" x2="602.5" y2="665"/>
  <line class="life" x1="835" y1="90" x2="835" y2="665"/>
  <line class="life" x1="1057.5" y1="90" x2="1057.5" y2="665"/>

  <!-- messages -->
  <line class="line" x1="120" y1="140" x2="352.5" y2="140"/>
  <text class="label" x="236" y="127" text-anchor="middle">1. 进入练与测</text>

  <line class="line" x1="352.5" y1="195" x2="602.5" y2="195"/>
  <text class="label" x="477" y="182" text-anchor="middle">2. 选择路径与模式</text>

  <line class="line" x1="602.5" y1="250" x2="835" y2="250"/>
  <text class="label" x="719" y="237" text-anchor="middle">3. 读取学习路径节点</text>

  <line class="dash" x1="835" y1="305" x2="602.5" y2="305"/>
  <text class="label" x="719" y="292" text-anchor="middle">4. 返回节点数据</text>

  <path class="line" d="M602.5 350 C665 350, 665 395, 602.5 395"/>
  <text class="label" x="725" y="376" text-anchor="middle">5. 生成练习/测评题目</text>

  <line class="line" x1="602.5" y1="430" x2="835" y2="430"/>
  <text class="label" x="719" y="417" text-anchor="middle">6. 保存会话与题目</text>

  <line class="dash" x1="602.5" y1="485" x2="352.5" y2="485"/>
  <text class="label" x="477" y="472" text-anchor="middle">7. 返回题目列表</text>

  <line class="line" x1="352.5" y1="540" x2="602.5" y2="540"/>
  <text class="label" x="477" y="527" text-anchor="middle">8. 提交答案或试卷</text>

  <line class="line" x1="602.5" y1="575" x2="835" y2="575"/>
  <text class="label" x="719" y="562" text-anchor="middle">9. 保存作答并统计成绩</text>

  <line class="line" x1="602.5" y1="610" x2="1057.5" y2="610"/>
  <text class="label" x="830" y="597" text-anchor="middle">10. 记录练测进度</text>

  <line class="dash" x1="602.5" y1="645" x2="352.5" y2="645"/>
  <text class="label" x="477" y="632" text-anchor="middle">11. 返回反馈或成绩</text>

  <!-- bottom boxes -->
  <rect class="box" x="45" y="670" width="150" height="70" rx="3"/>
  <text class="text" x="120" y="712" text-anchor="middle">学习者</text>

  <rect class="box" x="270" y="670" width="165" height="70" rx="3"/>
  <text class="text" x="352.5" y="712" text-anchor="middle">前端页面</text>

  <rect class="box" x="520" y="670" width="165" height="70" rx="3"/>
  <text class="text" x="602.5" y="712" text-anchor="middle">后端服务</text>

  <rect class="box" x="760" y="670" width="150" height="70" rx="3"/>
  <text class="text" x="835" y="712" text-anchor="middle">MySQL</text>

  <rect class="box" x="975" y="670" width="165" height="70" rx="3"/>
  <text class="text" x="1057.5" y="712" text-anchor="middle">进度服务</text>
</svg>
