services:
  # ============================================================
  # MySQL 8.0 - Relational data store
  # ============================================================
  mysql:
    image: mysql:8.0
    container_name: ica-mysql
    restart: unless-stopped
    ports:
      - "${MYSQL_HOST_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-coding_assistant}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --max_connections=200
      --innodb_buffer_pool_size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ica-network

  # ============================================================
  # Neo4j 5 - Knowledge graph store
  # ============================================================
  neo4j:
    image: neo4j:5
    container_name: ica-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_HOST_PORT:-17474}:7474"   # HTTP browser
      - "${NEO4J_BOLT_HOST_PORT:-17687}:7687"   # Bolt protocol
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4j123}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
      - ./docker/neo4j/init-data.cypher:/var/lib/neo4j/import/init-data.cypher
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ica-network

  # ============================================================
  # Redis 7 - Cache store
  # ============================================================
  redis:
    image: redis:7-alpine
    container_name: ica-redis
    restart: unless-stopped
    ports:
      - "16379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - ica-network

  # ============================================================
  # Elasticsearch 8 - Vector search store
  # ============================================================
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: ica-elasticsearch
    restart: unless-stopped
    ports:
      - "19200:9200"
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    networks:
      - ica-network

  # ============================================================
  # Backend - Spring Boot application
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ica-backend
    restart: unless-stopped
    expose:
      - "8080"
    environment:
      # Spring profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}

      # MySQL (mapped to application-*.yml placeholders)
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_DB: ${MYSQL_DATABASE:-coding_assistant}
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}

      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4j123}

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # Vector search
      VECTOR_SEARCH_ENABLED: ${VECTOR_SEARCH_ENABLED:-true}
      VECTOR_SEARCH_URIS: ${VECTOR_SEARCH_URIS:-http://elasticsearch:9200}
      VECTOR_SEARCH_INDEX: ${VECTOR_SEARCH_INDEX:-knowledge_document_vector}
      VECTOR_SEARCH_CHUNK_INDEX: ${VECTOR_SEARCH_CHUNK_INDEX:-knowledge_chunk_vector}
      VECTOR_SEARCH_QUERY_LOG_ENABLED: ${VECTOR_SEARCH_QUERY_LOG_ENABLED:-true}
      VECTOR_SEARCH_QUERY_LOG_INDEX: ${VECTOR_SEARCH_QUERY_LOG_INDEX:-query_log_index}
      VECTOR_SEARCH_RETRIEVAL_LOG_INDEX: ${VECTOR_SEARCH_RETRIEVAL_LOG_INDEX:-retrieval_log_index}
      VECTOR_SEARCH_TIMEOUT_MS: ${VECTOR_SEARCH_TIMEOUT_MS:-3000}
      VECTOR_SEARCH_NUM_CANDIDATES: ${VECTOR_SEARCH_NUM_CANDIDATES:-50}

      # JWT
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}

      # LLM
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}

      # File storage / logging
      UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
      APP_LOG_LEVEL: ${APP_LOG_LEVEL:-info}

      # JVM tuning
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      mysql:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      elasticsearch:
        condition: service_started
    networks:
      - ica-network

  # ============================================================
  # Nginx - Serves frontend static files & reverse-proxies API
  # ============================================================
  nginx:
    image: nginx:alpine
    container_name: ica-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - frontend-dist:/usr/share/nginx/html:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ica-network

  # ============================================================
  # Frontend - Vue 3 build stage (outputs to shared volume)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ica-frontend-build
    volumes:
      - frontend-dist:/app/dist
    # This container builds and exits; nginx serves the output
    command: ["sh", "-c", "cp -r /build-output/* /app/dist/ 2>/dev/null || true"]

volumes:
  mysql-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  redis-data:
    driver: local
  es-data:
    driver: local
  frontend-dist:
    driver: local

networks:
  ica-network:
    driver: bridge
