spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DB:coding_assistant}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms

neo4j:
  uri: ${NEO4J_URI}
  username: ${NEO4J_USER}
  password: ${NEO4J_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

llm:
  provider: ${LLM_PROVIDER:openai}
  openai:
    api-key: ${OPENAI_API_KEY}
    base-url: ${OPENAI_BASE_URL:https://api.openai.com/v1}
    model: ${OPENAI_MODEL:gpt-4o-mini}
  chatglm:
    api-key: ${CHATGLM_API_KEY:}
    base-url: ${CHATGLM_BASE_URL:}
    model: ${CHATGLM_MODEL:chatglm3-turbo}
  qwen:
    api-key: ${QWEN_API_KEY:}
    base-url: ${QWEN_BASE_URL:}
    model: ${QWEN_MODEL:qwen-turbo}

logging:
  level:
    com.coding.assistant: ${APP_LOG_LEVEL:info}
