spring:
  datasource:
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT:3306}/${MYSQL_DB:coding_assistant}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: ${MYSQL_USER}
    password: ${MYSQL_PASSWORD}

neo4j:
  uri: ${NEO4J_URI}
  username: ${NEO4J_USER}
  password: ${NEO4J_PASSWORD}

jwt:
  secret: ${JWT_SECRET}

llm:
  openai:
    api-key: ${OPENAI_API_KEY}

logging:
  level:
    com.coding.assistant: ${APP_LOG_LEVEL:info}
